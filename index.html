<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root {
  --bg:          #F0F2F5;
  --paper:       #FFFFFF;
  --ink:         #1E2128;
  --ink-muted:   #6C7280;
  --ink-faint:   #9CA3AF;
  --accent:      #4F6AF5;
  --accent-dark: #3A52D4;
  --accent-light:#EEF1FE;
  --accent-glow: rgba(79,106,245,.18);
  --border:      #DDE1E9;
  --border-dark: #C4C9D6;
  --toolbar-bg:  #FFFFFF;
  --editor-bg:   #FAFBFC;
  --shadow:      0 1px 4px rgba(30,33,40,.08), 0 4px 16px rgba(30,33,40,.05);
  --shadow-deep: 0 4px 24px rgba(30,33,40,.10), 0 12px 48px rgba(30,33,40,.08);
  --radius:      8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ── */
.app-header {
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  height: 54px;
  flex-shrink: 0;
  z-index: 200;
  box-shadow: var(--shadow);
}
.logo-icon {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 15px; font-weight: 700;
  font-family: 'Lora', serif; flex-shrink: 0;
  box-shadow: 0 2px 8px var(--accent-glow);
}
.logo-text { font-family: 'Lora', serif; font-size: 17px; font-weight: 600; color: var(--ink); }
.logo-badge {
  font-size: 9px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
  background: var(--accent-light); color: var(--accent);
  border-radius: 4px; padding: 2px 6px; margin-left: 2px;
}
.doc-title-wrap { flex: 1; }
#docTitle {
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  color: var(--ink); border: 1px solid transparent; border-radius: 6px;
  padding: 5px 9px; background: transparent; width: 100%; max-width: 380px; transition: .18s;
}
#docTitle:hover  { border-color: var(--border); background: var(--bg); }
#docTitle:focus  { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 3px var(--accent-glow); }

.header-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 6px; font-size: 12.5px; font-weight: 500;
  cursor: pointer; border: none; transition: .15s;
  font-family: 'DM Sans', sans-serif; white-space: nowrap;
}
.btn-ghost { background: transparent; color: var(--ink-muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--bg); color: var(--ink); border-color: var(--border-dark); }
.btn-accent { background: var(--accent); color: #fff; box-shadow: 0 2px 8px var(--accent-glow); }
.btn-accent:hover { background: var(--accent-dark); box-shadow: 0 3px 12px var(--accent-glow); }
.btn svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }

/* ── Markdown Toolbar ── */
.toolbar {
  background: var(--toolbar-bg);
  border-bottom: 1px solid var(--border);
  padding: 4px 14px;
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.tb-sep { width: 1px; height: 20px; background: var(--border); margin: 0 5px; flex-shrink: 0; }
.tb-btn {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 28px; height: 28px; padding: 0 6px;
  border-radius: 5px; border: none; background: transparent;
  cursor: pointer; color: var(--ink-muted); font-size: 12px; font-weight: 600;
  transition: .1s; flex-shrink: 0; font-family: 'DM Sans', sans-serif;
  user-select: none; white-space: nowrap; gap: 4px;
}
.tb-btn:hover { background: var(--bg); color: var(--ink); }
.tb-btn svg { width: 14px; height: 14px; fill: currentColor; pointer-events: none; flex-shrink: 0; }
.tb-btn.active { background: var(--accent-light); color: var(--accent); }

/* View toggle */
.view-toggle {
  display: flex; gap: 0; margin-left: auto; flex-shrink: 0;
  border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
}
.vt-btn {
  padding: 4px 12px; font-size: 11.5px; font-weight: 500;
  background: transparent; border: none; cursor: pointer; color: var(--ink-muted);
  font-family: 'DM Sans', sans-serif; transition: .12s;
}
.vt-btn:hover { background: var(--bg); color: var(--ink); }
.vt-btn.on { background: var(--accent-light); color: var(--accent); }
.vt-btn + .vt-btn { border-left: 1px solid var(--border); }

/* ── Main split area ── */
.main-area {
  flex: 1;
  display: flex;
  overflow: hidden;
  gap: 0;
}
.pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.pane-label {
  font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .7px;
  color: var(--ink-faint); padding: 6px 18px 5px;
  background: var(--editor-bg); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.pane + .pane { border-left: 1px solid var(--border); }

/* Editor pane */
.editor-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
}
#mdEditor {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px;
  line-height: 1.75;
  color: var(--ink);
  background: var(--editor-bg);
  border: none;
  outline: none;
  resize: none;
  padding: 28px 60px 28px 32px;
  overflow-y: scroll;
  tab-size: 2;
  caret-color: var(--accent);
}
#mdEditor::placeholder { color: var(--ink-faint); }

/* Syllable gutter */
#syllGutter {
  position: absolute;
  top: 0; right: 0;
  width: 52px;
  bottom: 0;
  pointer-events: none;
  overflow: hidden;
  border-left: 1px solid var(--border);
  background: var(--editor-bg);
}
.syl-badge {
  position: absolute;
  right: 0;
  left: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--ink-faint);
  transition: color .1s;
  user-select: none;
}
.syl-badge[data-haiku="5"]  { color: #059669; }
.syl-badge[data-haiku="7"]  { color: var(--accent); }
.syl-badge[data-haiku="hit"] { font-weight: 700; }

/* Preview pane */
.preview-scroll {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
  padding: 28px 24px 60px;
}
.preview-page {
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  background: var(--paper);
  box-shadow: var(--shadow-deep);
  border-radius: 3px;
  padding: 56px 64px;
}

/* ── Preview Typography ── */
#preview { font-family: 'Lora', serif; font-size: 11pt; line-height: 1.85; color: var(--ink); }
#preview h1 { font-size: 26pt; line-height: 1.2; margin: 0 0 12px; font-weight: 700; font-family: 'Lora', serif; }
#preview h2 { font-size: 18pt; line-height: 1.25; margin: 28px 0 8px; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
#preview h3 { font-size: 13.5pt; line-height: 1.35; margin: 22px 0 6px; font-weight: 600; }
#preview h4 { font-size: 11.5pt; line-height: 1.4; margin: 18px 0 4px; font-weight: 600; }
#preview h5,
#preview h6 { font-size: 10.5pt; margin: 14px 0 4px; font-weight: 600; color: var(--ink-muted); }
#preview p  { margin: 0 0 10px; }
#preview ul, #preview ol { padding-left: 24px; margin: 8px 0 10px; }
#preview li { margin: 4px 0; }
#preview blockquote {
  border-left: 3px solid var(--accent); padding: 4px 0 4px 16px;
  color: var(--ink-muted); font-style: italic; margin: 14px 0;
}
#preview blockquote p { margin: 0; }
#preview pre {
  background: #1E2128; color: #E2E8F0; padding: 18px 20px;
  border-radius: 8px; overflow-x: auto; margin: 14px 0;
  font-family: 'JetBrains Mono', monospace; font-size: 9pt; line-height: 1.65;
}
#preview code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg); padding: 2px 6px; border-radius: 4px;
  font-size: .88em; color: #3A52D4;
}
#preview pre code { background: none; padding: 0; color: inherit; font-size: inherit; border-radius: 0; }
#preview a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
#preview img { max-width: 100%; border-radius: 6px; margin: 10px 0; }
#preview table { border-collapse: collapse; width: 100%; margin: 14px 0; font-size: 10pt; }
#preview td, #preview th { border: 1px solid var(--border); padding: 8px 12px; vertical-align: top; }
#preview th { background: var(--bg); font-weight: 600; }
#preview hr { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
#preview input[type=checkbox] { margin-right: 6px; accent-color: var(--accent); }

/* KaTeX display override */
#preview .katex-display { margin: 14px 0; overflow-x: auto; }

/* Empty state */
.preview-empty {
  text-align: center; color: var(--ink-faint); padding-top: 60px;
  font-size: 13px; line-height: 2; pointer-events: none; user-select: none;
}
.preview-empty svg { width: 40px; height: 40px; fill: var(--border); margin-bottom: 10px; }

/* ── Status Bar ── */
.status-bar {
  height: 26px; background: var(--toolbar-bg); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 18px; gap: 18px;
  font-size: 11px; color: var(--ink-faint); flex-shrink: 0;
}
.status-bar span { display: flex; align-items: center; gap: 5px; }

/* ── Visibility modes ── */
body[data-view="editor"] .pane:nth-child(2) { display: none; }
body[data-view="preview"] .pane:nth-child(1) { display: none; }

/* ── Scrollbars ── */
#mdEditor::-webkit-scrollbar,
.preview-scroll::-webkit-scrollbar { width: 6px; }
#mdEditor::-webkit-scrollbar-track,
.preview-scroll::-webkit-scrollbar-track { background: transparent; }
#mdEditor::-webkit-scrollbar-thumb,
.preview-scroll::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 3px; }

/* ── Tooltips ── */
[data-tip] { position: relative; }
[data-tip]:hover::after {
  content: attr(data-tip); position: absolute; bottom: calc(100% + 6px);
  left: 50%; transform: translateX(-50%); background: #1E2128; color: #fff;
  font-size: 10.5px; padding: 4px 8px; border-radius: 5px;
  white-space: nowrap; pointer-events: none; z-index: 9999;
  font-family: 'DM Sans', sans-serif; box-shadow: 0 3px 10px rgba(30,33,40,.25);
}

/* ── Print (PDF export) ── */
@media print {
  html, body { height: auto; overflow: visible; }
  .app-header, .toolbar, .pane:first-child, .status-bar { display: none !important; }
  .main-area { display: block; }
  .pane:last-child { display: block !important; border: none; }
  .preview-scroll { overflow: visible; padding: 0; background: #fff; }
  .preview-page {
    box-shadow: none; border-radius: 0;
    padding: 0; max-width: 100%; width: 100%;
  }
  #preview { font-size: 11pt; }
  #preview pre { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  @page { margin: 2cm; }
}

@media (max-width: 700px) {
  .logo-text, .logo-badge { display: none; }
  #mdEditor { padding: 16px; }
  .preview-page { padding: 28px 22px; }
}
</style>
</head>

<div class="status-bar">
  <span id="wordCount">0 words</span>
  <span id="charCount">0 chars</span>
  <span id="lineCount">0 lines</span>
  <span style="margin-left:auto;color:var(--ink-faint)" id="saveStatus">Auto-saved</span>
</div>

<script>
'use strict';

/* ── Marked configuration ── */
marked.setOptions({
  breaks: true,
  gfm: true,
});

// Custom renderer for task lists
const renderer = new marked.Renderer();
renderer.listitem = function(text, task, checked) {
  if (task) {
    return `<li style="list-style:none;margin-left:-20px">
      <input type="checkbox" ${checked ? 'checked' : ''} disabled> ${text}</li>`;
  }
  return `<li>${text}</li>`;
};
marked.use({ renderer });

const editor   = document.getElementById('mdEditor');
const preview  = document.getElementById('preview');
const previewEmpty = document.getElementById('previewEmpty');
const syllGutter = document.getElementById('syllGutter');

/* ── Syllable counting ── */
function countSyllables(word) {
  word = word.toLowerCase().replace(/[^a-z]/g, '');
  if (!word) return 0;
  if (word.length <= 3) return 1;
  // Remove trailing silent e patterns
  word = word.replace(/(?:[^laeiouy]es|[^laeiouy]ed|[^laeiouy]e)$/, '');
  word = word.replace(/^y/, '');
  const m = word.match(/[aeiouy]{1,2}/g);
  return m ? m.length : 1;
}

function lineSyllables(line) {
  // Strip markdown syntax so # ** _ ` etc. don't add phantom syllable words
  const text = line
    .replace(/^#+\s*/, '')          // headings
    .replace(/[*_~`>[\]()!]/g, '')  // inline markers
    .replace(/https?:\/\/\S+/g, '') // URLs
    .trim();
  if (!text) return 0;
  return text.split(/\s+/).reduce((sum, w) => sum + countSyllables(w), 0);
}

/* ── Gutter renderer ── */
const FONT_SIZE  = 13.5;
const LINE_H_EM  = 1.75;
const LINE_H_PX  = FONT_SIZE * LINE_H_EM; // ≈23.625
const PAD_TOP    = 28;
const BADGE_H    = LINE_H_PX;

function updateGutter() {
  const lines     = editor.value.split('\n');
  const scrollTop = editor.scrollTop;
  const fragments = [];

  lines.forEach((line, i) => {
    const syl = lineSyllables(line);
    if (syl === 0) return;
    const y = PAD_TOP + i * LINE_H_PX - scrollTop;
    // Only render badges that are visible
    if (y + BADGE_H < 0 || y > syllGutter.clientHeight + BADGE_H) return;
    // Haiku highlighting: 5 or 7 syllables get special colour via data attr
    const haikuAttr = (syl === 5 || syl === 7) ? ` data-haiku="${syl}"` : '';
    fragments.push(
      `<div class="syl-badge"${haikuAttr} style="top:${y.toFixed(1)}px;height:${BADGE_H.toFixed(1)}px">${syl}</div>`
    );
  });

  syllGutter.innerHTML = fragments.join('');
}

/* ── Render markdown → HTML ── */
function renderPreview() {
  const md = editor.value;
  if (!md.trim()) {
    preview.innerHTML = '';
    previewEmpty.style.display = '';
    preview.appendChild(previewEmpty);
    return;
  }
  previewEmpty.style.display = 'none';

  // Parse markdown
  let html = marked.parse(md);
  preview.innerHTML = html;

  // KaTeX render — process $...$ inline and $$...$$ display
  renderMathInElement(preview, {
    delimiters: [
      { left: '$$', right: '$$', display: true },
      { left: '$', right: '$', display: false },
      { left: '\\(', right: '\\)', display: false },
      { left: '\\[', right: '\\]', display: true },
    ],
    throwOnError: false,
  });
}

/* ── Debounce ── */
let renderTimer;
function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(renderPreview, 120);
}

editor.addEventListener('input', () => {
  scheduleRender();
  updateStatus();
  autosave();
  updateGutter();
});

editor.addEventListener('scroll', updateGutter);

/* ── Status bar ── */
function updateStatus() {
  const text = editor.value;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const lines = text ? text.split('\n').length : 0;
  document.getElementById('wordCount').textContent = words + ' word' + (words !== 1 ? 's' : '');
  document.getElementById('charCount').textContent = text.length + ' chars';
  document.getElementById('lineCount').textContent = lines + ' line' + (lines !== 1 ? 's' : '');
}

/* ── Autosave to localStorage ── */
let saveTimer;
function autosave() {
  clearTimeout(saveTimer);
  document.getElementById('saveStatus').textContent = 'Saving…';
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem('lelepaMD_content', editor.value);
      localStorage.setItem('lelepaMD_title', document.getElementById('docTitle').value);
      document.getElementById('saveStatus').textContent = 'Saved';
    } catch(_) {
      document.getElementById('saveStatus').textContent = 'Auto-save unavailable';
    }
  }, 800);
}

function loadSaved() {
  try {
    const saved = localStorage.getItem('lelepaMD_content');
    const title = localStorage.getItem('lelepaMD_title');
    if (saved) { editor.value = saved; }
    if (title) { document.getElementById('docTitle').value = title; }
  } catch(_) {}
}

/* ── Import MD ── */
document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('importFile').click();
});
document.getElementById('importFile').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    editor.value = e.target.result;
    // Set title from filename
    const name = file.name.replace(/\.(md|markdown|txt)$/i, '');
    document.getElementById('docTitle').value = name || 'Untitled';
    renderPreview();
    updateStatus();
    autosave();
  };
  reader.readAsText(file);
  this.value = ''; // reset so same file can be re-imported
});

/* ── Export MD ── */
document.getElementById('btnExportMD').addEventListener('click', () => {
  const content = editor.value;
  const title = document.getElementById('docTitle').value || 'document';
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = title + '.md'; a.click();
  URL.revokeObjectURL(url);
});

/* ── Export PDF ── */
document.getElementById('btnExportPDF').addEventListener('click', () => {
  // Make sure preview is rendered before printing
  renderPreview();
  setTimeout(() => window.print(), 200);
});

/* ── View toggle ── */
document.querySelectorAll('.vt-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('on'));
    this.classList.add('on');
    document.body.setAttribute('data-view', this.dataset.view);
  });
});

/* ── Toolbar actions ── */

// Simple surround (inline): **text** or *text* etc.
document.querySelectorAll('[data-surround]').forEach(btn => {
  btn.addEventListener('click', () => {
    const marker = btn.dataset.surround;
    const start = editor.selectionStart;
    const end   = editor.selectionEnd;
    const sel   = editor.value.substring(start, end);
    const before = editor.value.substring(0, start);
    const after  = editor.value.substring(end);
    const newText = marker + (sel || 'text') + marker;
    editor.value = before + newText + after;
    // Re-select the inner text
    editor.selectionStart = start + marker.length;
    editor.selectionEnd   = end   + marker.length;
    editor.focus();
    scheduleRender(); updateStatus(); autosave();
  });
});

// Line prefix (block): # heading, > quote, - list, 1. list
document.querySelectorAll('[data-wrap][data-line]').forEach(btn => {
  btn.addEventListener('click', () => {
    const prefix = btn.dataset.wrap;
    const start  = editor.selectionStart;
    const end    = editor.selectionEnd;
    const value  = editor.value;

    // Find the beginning of the first selected line
    const lineStart = value.lastIndexOf('\n', start - 1) + 1;
    const before = value.substring(0, lineStart);
    const lineContent = value.substring(lineStart);

    // Apply prefix to each line in the selection
    const selLines = value.substring(lineStart, end).split('\n');
    const prefixed = selLines.map(l => {
      // Toggle: remove prefix if already present
      if (l.startsWith(prefix)) return l.slice(prefix.length);
      return prefix + l;
    }).join('\n');

    editor.value = before + prefixed + value.substring(end);
    editor.selectionStart = lineStart;
    editor.selectionEnd   = lineStart + prefixed.length;
    editor.focus();
    scheduleRender(); updateStatus(); autosave();
  });
});

// Code block
document.getElementById('btnCodeBlock').addEventListener('click', () => {
  const start = editor.selectionStart;
  const end   = editor.selectionEnd;
  const sel   = editor.value.substring(start, end) || 'code here';
  const block = '```\n' + sel + '\n```';
  editor.value = editor.value.substring(0, start) + block + editor.value.substring(end);
  editor.selectionStart = start + 4;
  editor.selectionEnd   = start + 4 + sel.length;
  editor.focus();
  scheduleRender(); updateStatus(); autosave();
});

// Link
document.getElementById('btnLink').addEventListener('click', () => {
  const sel  = editor.value.substring(editor.selectionStart, editor.selectionEnd) || 'Link text';
  const url  = prompt('URL:', 'https://');
  if (!url) return;
  const md   = `[${sel}](${url})`;
  const s = editor.selectionStart;
  editor.value = editor.value.substring(0, s) + md + editor.value.substring(editor.selectionEnd);
  editor.focus();
  scheduleRender(); updateStatus(); autosave();
});

// Image
document.getElementById('btnImage').addEventListener('click', () => {
  const alt = prompt('Alt text:', 'image');
  if (alt === null) return;
  const url = prompt('Image URL:', 'https://');
  if (!url) return;
  const md  = `![${alt}](${url})`;
  const s = editor.selectionStart;
  editor.value = editor.value.substring(0, s) + md + editor.value.substring(editor.selectionEnd);
  editor.focus();
  scheduleRender(); updateStatus(); autosave();
});

// Table
document.getElementById('btnTable').addEventListener('click', () => {
  const cols = parseInt(prompt('Columns:', '3'), 10) || 3;
  const rows = parseInt(prompt('Rows (excluding header):', '2'), 10) || 2;
  const header = Array.from({length: cols}, (_, i) => `Header ${i+1}`).join(' | ');
  const sep    = Array.from({length: cols}, () => '---').join(' | ');
  const dataRow = Array.from({length: cols}, (_, i) => `Cell ${i+1}`).join(' | ');
  const allRows = [header, sep, ...Array.from({length: rows}, () => dataRow)].join('\n');
  const md = '\n' + allRows + '\n';
  const s = editor.selectionStart;
  editor.value = editor.value.substring(0, s) + md + editor.value.substring(editor.selectionEnd);
  editor.focus();
  scheduleRender(); updateStatus(); autosave();
});

// HR
document.getElementById('btnHR').addEventListener('click', () => {
  const s = editor.selectionStart;
  const md = '\n---\n';
  editor.value = editor.value.substring(0, s) + md + editor.value.substring(s);
  editor.selectionStart = editor.selectionEnd = s + md.length;
  editor.focus();
  scheduleRender(); updateStatus(); autosave();
});

// Undo / Redo (native)
document.getElementById('btnUndo').addEventListener('click', () => { editor.focus(); document.execCommand('undo'); scheduleRender(); });
document.getElementById('btnRedo').addEventListener('click', () => { editor.focus(); document.execCommand('redo'); scheduleRender(); });

/* ── Keyboard shortcuts ── */
editor.addEventListener('keydown', e => {
  const ctrl = e.ctrlKey || e.metaKey;

  // Bold
  if (ctrl && e.key === 'b') {
    e.preventDefault();
    document.querySelector('[data-surround="**"]').click();
    return;
  }
  // Italic
  if (ctrl && e.key === 'i') {
    e.preventDefault();
    document.querySelector('[data-surround="*"]').click();
    return;
  }
  // Save (Ctrl+S)
  if (ctrl && e.key === 's') {
    e.preventDefault();
    autosave();
    return;
  }

  // Tab → insert 2 spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end   = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    scheduleRender();
    return;
  }

  // Auto-close markdown pairs
  const pairs = { '`': '`', '_': '_', '*': '*', '[': ']', '(': ')' };
  if (pairs[e.key] && editor.selectionStart === editor.selectionEnd) {
    const start = editor.selectionStart;
    const nextChar = editor.value[start];
    // Only auto-close if next char is space, newline, or end
    if (!nextChar || nextChar === ' ' || nextChar === '\n') {
      e.preventDefault();
      editor.value = editor.value.substring(0, start) + e.key + pairs[e.key] + editor.value.substring(start);
      editor.selectionStart = editor.selectionEnd = start + 1;
      scheduleRender();
    }
  }
});

/* ── Title change → autosave ── */
document.getElementById('docTitle').addEventListener('input', autosave);

/* ── Init ── */
loadSaved();

// If nothing was loaded, set a starter document
if (!editor.value) {
  editor.value = `# Welcome to LelepaDocs

Start writing **Markdown** here. The preview updates as you type.

## Features

- Import & export **.md** files
- Export to **PDF** via the button above
- **KaTeX** math: $E = mc^2$ or display mode:

$$\\int_{-\\infty}^{\\infty} e^{-x^2} dx = \\sqrt{\\pi}$$

- Tables, code blocks, task lists, and more

## Keyboard Shortcuts

| Shortcut | Action |
|---|---|
| \`Ctrl+B\` | Bold |
| \`Ctrl+I\` | Italic |
| \`Ctrl+S\` | Save |
| \`Tab\` | Indent (2 spaces) |

> *Tip: Use the view toggle (top right of toolbar) to switch between editor-only, split, or preview-only mode.*

\`\`\`js
// Example code block
const greet = name => \`Hello, \${name}!\`;
console.log(greet("world"));
\`\`\`

- [x] Markdown editor
- [x] Live preview
- [x] Import / Export MD
- [x] Export PDF
- [ ] World domination
`;
}

renderPreview();
updateStatus();
updateGutter();
</script>
</body>
</html>
